services:
  # PostgreSQL Database
  postgres:
    image: postgres:18-alpine
    container_name: bingoscape-postgres
    hostname: ${DB_HOST:-bingoscapedb}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-bingoscape}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bingoscape-network

  # Next.js Application
  app:
    image: ghcr.io/bingoscape/bingoscape:main
    container_name: bingoscape-app
    restart: unless-stopped
    user: "1001:1001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:3000/api/uptime || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      # Database Configuration
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@${DB_HOST:-bingoscapedb}:5432/${DB_NAME:-bingoscape}

      # NextAuth Configuration
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}

      # OAuth Providers
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

      # Application Configuration
      SUPER_ADMIN_EMAILS: ${SUPER_ADMIN_EMAILS:-admin@example.com}
      NODE_ENV: production

      # Observability Configuration
      METRICS_ENABLED: "true"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://signoz-otel-collector:4318"

      # Alert Configuration
      ALERT_DISCORD_WEBHOOK_URL: ${ALERT_DISCORD_WEBHOOK_URL:-}

      # Skip environment validation in container
      SKIP_ENV_VALIDATION: "1"
    # Port 3000 is only exposed to Docker network (nginx proxies to it)
    ports:
      - "127.0.0.1:3000:3000"
    expose:
      - "3000"
    volumes:
      # Mount uploads directory from host system
      # Update the path on the left side to your desired host directory
      - ./uploads:/app/public/uploads:rw
    networks:
      - bingoscape-network
    # Uncomment to run migrations on startup
    # command: sh -c "npm run db:migrate && node server.js"

  # Optional: Database migrations service (run once)
  migrate:
    image: ghcr.io/bingoscape/bingoscape:main
    container_name: bingoscape-migrate
    user: root # Run as root to have permission to execute drizzle-kit
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@${DB_HOST:-bingoscapedb}:5432/${DB_NAME:-bingoscape}
      SKIP_ENV_VALIDATION: "1"
      NODE_ENV: production
    working_dir: /app
    command: npx drizzle-kit push
    networks:
      - bingoscape-network
    profiles:
      - tools # Only run when explicitly specified

  # --- Observability: SigNoz ---
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: signoz-clickhouse
    volumes:
      - signoz_clickhouse_data:/var/lib/clickhouse
    networks:
      - bingoscape-network

  query-service:
    image: signoz/query-service:latest
    container_name: signoz-query-service
    depends_on:
      - clickhouse
    environment:
      - CLICKHOUSE_HOST=signoz-clickhouse
      - CLICKHOUSE_PORT=9000
    networks:
      - bingoscape-network

  frontend:
    image: signoz/frontend:latest
    container_name: signoz-frontend
    ports:
      - "3301:3301" # SigNoz UI
    depends_on:
      - query-service
    networks:
      - bingoscape-network

  otel-collector:
    image: signoz/signoz-otel-collector:latest
    container_name: signoz-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/signoz/otel-collector-config.yaml:/etc/otel-collector-config.yaml
      # Mount docker socket/logs to allow filelog scraping of pino logs
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    depends_on:
      - clickhouse
    networks:
      - bingoscape-network

  # PostgreSQL Exporter - Database metrics
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:latest
    container_name: bingoscape-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@${DB_HOST:-bingoscapedb}:5432/${DB_NAME:-bingoscape}?sslmode=disable"
      PG_EXPORTER_EXTEND_QUERY_PATH: "/etc/postgres_exporter/queries.yaml"
    ports:
      - "127.0.0.1:9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bingoscape-network

  # Node Exporter - System metrics (optional)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: bingoscape-node-exporter
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - bingoscape-network
    profiles:
      - monitoring # Optional, enable with --profile monitoring

volumes:
  postgres_data:
    driver: local
  signoz_clickhouse_data:
    driver: local

networks:
  bingoscape-network:
    driver: bridge
